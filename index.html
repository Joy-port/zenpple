<!DOCTYPE html>
<html lang="zh-TW">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>森波 Zenpple — Brand Identity</title>
	<link
		href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,400;0,600;1,100;1,300&family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+TC:wght@300;400;500;700;900&family=Fraunces:ital,opsz,wght@0,9..144,100;0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,100;1,9..144,900&family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,300;1,700&display=swap"
		rel="stylesheet">
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		:root {
			--ink: #2A2A2A;
			--indigo: #4A6B8A;
			--rose: #C47B7B;
			--dusk: #7B6B9E;
			--amber: #C4784A;
			--celadon: #5E8E8A;
			--sand: #B09070;
			--cream: #F2EFEA;
			--bg: #F4F2EE;
		}

		html {
			scroll-behavior: smooth;
		}

		body {
			background: var(--bg);
			color: var(--ink);
			font-family: 'Noto Sans TC', sans-serif;
			font-size: 14px;
			line-height: 1.6;
		}

		/* ─────────────────────────────────────────
   01. HERO — COVER
───────────────────────────────────────── */
		.hero {
			position: relative;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			background: var(--bg);
		}

		.hero-bg {
			position: absolute;
			inset: 0;
			/* 2 blobs only — same hue family, well-separated, low opacity = clean air */
			background:
				radial-gradient(ellipse 58% 52% at 14% 22%, rgba(94, 148, 142, 0.11) 0%, transparent 62%),
				radial-gradient(ellipse 48% 52% at 88% 78%, rgba(120, 104, 158, 0.09) 0%, transparent 58%);
			pointer-events: none;
		}

		.hero-inner {
			position: relative;
			z-index: 1;
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			gap: 0;
		}

		/* ── Logo area ── */
		/*
  TO USE REAL LOGO:
  Replace the .logo-css block below with:
  <img src="your-logo.png" alt="Zenpple" class="logo-img" />
  and set:  .logo-img { width: 220px; }
*/
		.logo-wrap {
			margin-bottom: 36px;
		}

		.logo-mark {
			/* Calligraphy mark placeholder — swap <img> here */
			width: 88px;
			height: 88px;
			margin: 0 auto 18px;
			border-radius: 50%;
			background:
				radial-gradient(ellipse at 35% 30%, rgba(94, 142, 138, 0.5) 0%, transparent 55%),
				radial-gradient(ellipse at 75% 70%, rgba(74, 107, 138, 0.4) 0%, transparent 55%),
				rgba(80, 112, 120, 0.18);
			border: 1.5px solid rgba(94, 142, 138, 0.35);
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		.logo-mark img {
			width: 100%;
			height: 100%;
			object-fit: contain;
		}

		/* CSS fallback text shown only when no <img> inside .logo-mark */
		.logo-mark:not(:has(img))::after {
			content: "森";
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 900;
			font-size: 32px;
			color: var(--celadon);
			opacity: 0.7;
		}

		.logo-wordmark {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 42px;
			letter-spacing: 0.38em;
			text-transform: uppercase;
			color: var(--ink);
			line-height: 1;
		}

		.hero-tagline {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 400;
			font-size: 20px;
			letter-spacing: 0.38em;
			color: var(--ink);
			opacity: 0.82;
			margin-top: 24px;
		}

		.hero-tagline-en {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 300;
			/* 100 on Windows is near-invisible; 300 is the minimum readable weight */
			font-size: 13px;
			letter-spacing: 0.38em;
			text-transform: uppercase;
			color: var(--ink);
			opacity: 0.68;
			margin-top: 12px;
		}

		.hero-divider {
			width: 32px;
			height: 1px;
			background: var(--ink);
			opacity: 0.18;
			margin: 48px auto 0;
		}

		.hero-scroll-hint {
			position: absolute;
			bottom: 36px;
			left: 50%;
			transform: translateX(-50%);
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			opacity: 0.25;
		}


		/* ─────────────────────────────────────────
   02. WRAPPER
───────────────────────────────────────── */
		.page {
			max-width: 1020px;
			margin: 0 auto;
			padding: 80px 48px 120px;
		}

		.section-label {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			opacity: 0.35;
			margin-bottom: 28px;
		}

		section {
			margin-bottom: 96px;
		}


		/* ─────────────────────────────────────────
   03. COLOUR SYSTEM
───────────────────────────────────────── */
		.color-grid {
			display: grid;
			grid-template-columns: repeat(8, 1fr);
			gap: 10px;
		}

		.swatch {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.swatch-chip {
			aspect-ratio: 1;
			border-radius: 6px;
			width: 100%;
		}

		.swatch-name {
			font-family: 'Noto Sans TC', sans-serif;
			font-size: 11px;
			font-weight: 500;
			line-height: 1.3;
		}

		.swatch-hex {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			opacity: 0.4;
			letter-spacing: 0.06em;
		}

		.swatch-role {
			font-family: 'DM Sans', sans-serif;
			font-size: 9px;
			opacity: 0.4;
			margin-top: 2px;
			line-height: 1.4;
		}


		/* ─────────────────────────────────────────
   04. TYPOGRAPHY
───────────────────────────────────────── */
		.type-demo {
			display: flex;
			flex-direction: column;
			gap: 0;
			border: 1px solid rgba(42, 42, 42, 0.08);
			border-radius: 8px;
			overflow: hidden;
		}

		.type-row {
			display: grid;
			grid-template-columns: 140px 1fr 120px;
			align-items: center;
			gap: 32px;
			padding: 24px 32px;
			border-bottom: 1px solid rgba(42, 42, 42, 0.06);
		}

		.type-row:last-child {
			border-bottom: none;
		}

		.type-meta {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		.type-level {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.15em;
			text-transform: uppercase;
			opacity: 0.35;
		}

		.type-spec {
			font-family: 'DM Sans', sans-serif;
			font-size: 11px;
			opacity: 0.72;
			line-height: 1.7;
		}

		.type-usage {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			opacity: 0.55;
			text-align: right;
			line-height: 1.6;
		}

		/* Display levels */
		.t-d1 {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 52px;
			letter-spacing: 0.3em;
			text-transform: uppercase;
			line-height: 1;
		}

		.t-d2 {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 900;
			font-size: 36px;
			letter-spacing: 0.05em;
			line-height: 1.15;
		}

		.t-h1 {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 700;
			font-size: 22px;
			letter-spacing: 0.08em;
		}

		.t-h2 {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 300;
			font-size: 16px;
			letter-spacing: 0.28em;
			text-transform: uppercase;
		}

		.t-body {
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			font-weight: 400;
			line-height: 1.7;
			opacity: 0.7;
		}

		.t-mono {
			font-family: 'Space Mono', monospace;
			font-size: 11px;
			letter-spacing: 0.1em;
			opacity: 0.45;
		}


		/* ─────────────────────────────────────────
   05. COURSE CARDS — Organic Colour Field
───────────────────────────────────────── */
		.cards-grid {
			display: grid;
			grid-template-columns: repeat(3, 1fr);
			gap: 20px;
		}

		.course-card {
			border-radius: 14px;
			padding: 32px 28px 36px;
			min-height: 320px;
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			position: relative;
			overflow: hidden;
		}

		/* QI-SB 靈性頌缽音流 — pure teal-blue family only */
		/* Rule: 2 blobs, analogous hues, base = mid-point of the two */
		.card-sb {
			background:
				radial-gradient(ellipse 65% 60% at 12% 18%, #5AAAC4 0%, transparent 58%),
				radial-gradient(ellipse 60% 58% at 90% 85%, #5ABCB0 0%, transparent 56%),
				#7AB8BC;
		}

		/* HL 深層系統對齊 — rose + dusk separated to corners, clean base */
		/* Rule: keep warm rose and cool dusk FAR apart so they don't grey-mix in centre */
		.card-hl {
			background:
				radial-gradient(ellipse 60% 55% at 8% 10%, #C084A8 0%, transparent 54%),
				radial-gradient(ellipse 55% 60% at 92% 90%, #8878C0 0%, transparent 54%),
				#AA96B8;
		}

		/* SC 薩滿靈魂覺醒 — deep slate-blue, subtle teal accent */
		.card-sc {
			background:
				radial-gradient(ellipse 60% 55% at 14% 12%, #4E7CB4 0%, transparent 56%),
				radial-gradient(ellipse 55% 58% at 88% 88%, #4E9696 0%, transparent 54%),
				#5A82A8;
		}

		.card-code {
			font-family: 'Space Mono', monospace;
			font-size: 10px;
			letter-spacing: 0.15em;
			color: rgba(255, 255, 255, 0.55);
		}

		.card-body {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.card-title-zh {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 700;
			font-size: 20px;
			letter-spacing: 0.05em;
			color: #fff;
			text-shadow: 0 1px 12px rgba(0, 0, 0, 0.12);
		}

		.card-title-en {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 200;
			font-size: 11px;
			letter-spacing: 0.32em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.65);
		}

		.card-desc {
			font-family: 'DM Sans', sans-serif;
			font-size: 12px;
			color: rgba(255, 255, 255, 0.7);
			line-height: 1.7;
			margin-top: 4px;
		}

		.card-tag {
			display: inline-flex;
			align-items: center;
			height: 22px;
			padding: 0 10px;
			border-radius: 20px;
			background: rgba(255, 255, 255, 0.22);
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.1em;
			color: rgba(255, 255, 255, 0.85);
			margin-top: 12px;
			width: fit-content;
		}


		/* ─────────────────────────────────────────
   06. BACKGROUND / ATMOSPHERE
───────────────────────────────────────── */
		.atmo-demo {
			border-radius: 14px;
			padding: 56px 48px;
			/* single-hue blob: celadon only, stays clean on all displays */
			background:
				radial-gradient(ellipse 55% 55% at 18% 28%, rgba(90, 170, 162, 0.13) 0%, transparent 60%),
				var(--bg);
			border: 1px solid rgba(42, 42, 42, 0.07);
		}

		.atmo-inner {
			max-width: 560px;
			display: flex;
			flex-direction: column;
			gap: 20px;
		}

		.atmo-label {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--celadon);
			opacity: 0.6;
		}

		.atmo-heading {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 700;
			font-size: 28px;
			letter-spacing: 0.06em;
			line-height: 1.4;
			color: var(--ink);
		}

		.atmo-body {
			font-family: 'DM Sans', sans-serif;
			font-size: 14px;
			line-height: 1.85;
			color: var(--ink);
			opacity: 0.78;
			max-width: 460px;
		}

		.atmo-cta {
			display: inline-flex;
			align-items: center;
			height: 40px;
			padding: 0 22px;
			border-radius: 4px;
			background: var(--ink);
			color: var(--cream);
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 300;
			font-size: 11px;
			letter-spacing: 0.25em;
			text-transform: uppercase;
			border: none;
			cursor: pointer;
			width: fit-content;
		}


		/* ─────────────────────────────────────────
   07. DARK / INK FIELD
───────────────────────────────────────── */
		.dark-hero {
			border-radius: 14px;
			padding: 72px 56px;
			/* dark: deeper, richer blobs so the field is clearly dark not grey */
			background:
				radial-gradient(ellipse 55% 60% at 8% 12%, rgba(90, 170, 162, 0.30) 0%, transparent 55%),
				radial-gradient(ellipse 50% 55% at 92% 90%, rgba(118, 100, 160, 0.26) 0%, transparent 52%),
				#141414;
			display: flex;
			flex-direction: column;
			align-items: center;
			text-align: center;
			gap: 16px;
		}

		.dark-hero-sub {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.3em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.50);
		}

		.dark-hero-main {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 58px;
			letter-spacing: 0.38em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.96);
			line-height: 1;
		}

		.dark-hero-tagline {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 300;
			font-size: 15px;
			letter-spacing: 0.32em;
			color: rgba(255, 255, 255, 0.65);
			margin-top: 6px;
		}

		.dark-color-row {
			display: flex;
			gap: 8px;
			margin-top: 40px;
			flex-wrap: wrap;
			justify-content: center;
		}

		.dark-color-pill {
			display: flex;
			align-items: center;
			gap: 7px;
			padding: 5px 12px 5px 7px;
			border-radius: 20px;
			border: 1px solid rgba(255, 255, 255, 0.22);
			background: rgba(255, 255, 255, 0.05);
		}

		.dark-color-dot {
			width: 9px;
			height: 9px;
			border-radius: 50%;
			flex-shrink: 0;
		}

		.dark-color-name {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.08em;
			color: rgba(255, 255, 255, 0.65);
		}


		/* ─────────────────────────────────────────
   08. BRAND STATEMENT CLOSE
───────────────────────────────────────── */
		.statement-section {
			border-top: 1px solid rgba(42, 42, 42, 0.1);
			padding-top: 72px;
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 64px;
			align-items: start;
		}

		.statement-left {
			display: flex;
			flex-direction: column;
			gap: 20px;
		}

		.statement-zh {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 700;
			font-size: 26px;
			letter-spacing: 0.06em;
			line-height: 1.6;
		}

		.statement-en {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 14px;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			opacity: 0.55;
			line-height: 1.7;
		}

		.statement-right {
			display: flex;
			flex-direction: column;
			gap: 12px;
			padding-top: 8px;
		}

		.statement-point {
			display: flex;
			gap: 14px;
			align-items: baseline;
		}

		.sp-dot {
			width: 4px;
			height: 4px;
			border-radius: 50%;
			background: var(--celadon);
			flex-shrink: 0;
			margin-top: 7px;
		}

		.sp-text {
			font-family: 'DM Sans', sans-serif;
			font-size: 13px;
			line-height: 1.75;
			opacity: 0.78;
		}

		/* ─────────────────────────────────────────
   09. SEOUL-STYLE EN TYPOGRAPHY
   Context: calligraphy illustration BG, no Chinese text,
   English must hold its own visually
───────────────────────────────────────── */

		/* Gradient note rule for these panels:
   ONE hue per panel, single blob at one corner = clean */

		.seoul-grid {
			display: grid;
			grid-template-columns: 1fr 1fr;
			gap: 16px;
		}

		.seoul-grid .full-row {
			grid-column: 1 / -1;
		}

		/* Each style card */
		.stype {
			border-radius: 14px;
			padding: 40px 36px;
			min-height: 200px;
			display: flex;
			flex-direction: column;
			justify-content: flex-end;
			position: relative;
			overflow: hidden;
		}

		/* Label badge top-right */
		.stype-label {
			position: absolute;
			top: 20px;
			right: 20px;
			font-family: 'Space Mono', monospace;
			font-size: 8px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			padding: 4px 10px;
			border-radius: 20px;
		}

		/* ── Style A: Bold Impact — Fraunces Black (like Seoul poster) ── */
		.stype-a {
			background:
				radial-gradient(ellipse 70% 65% at 0% 100%, rgba(176, 110, 130, 0.28) 0%, transparent 60%),
				#B8818E;
			/* warm rose */
		}

		.stype-a .stype-label {
			background: rgba(0, 0, 0, 0.2);
			color: rgba(255, 255, 255, 0.6);
		}

		.sa-title {
			font-family: 'Fraunces', serif;
			font-weight: 900;
			font-size: 52px;
			line-height: 0.92;
			color: #F5F0E8;
			letter-spacing: -0.01em;
		}

		.sa-brand {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 11px;
			letter-spacing: 0.38em;
			text-transform: uppercase;
			color: rgba(245, 240, 232, 0.55);
			margin-top: 16px;
		}

		/* ── Style B: Ultra-light Ghost — Josefin all-caps tower ── */
		.stype-b {
			background:
				radial-gradient(ellipse 65% 60% at 100% 0%, rgba(78, 140, 180, 0.22) 0%, transparent 58%),
				#2A2A2A;
		}

		.stype-b .stype-label {
			background: rgba(255, 255, 255, 0.08);
			color: rgba(255, 255, 255, 0.35);
		}

		.sb-stack {
			display: flex;
			flex-direction: column;
			gap: 0;
		}

		.sb-line-lg {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 60px;
			letter-spacing: 0.22em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.88);
			line-height: 1;
		}

		.sb-line-sm {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 11px;
			letter-spacing: 0.5em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.28);
			margin-top: 14px;
		}

		/* ── Style C: Contrast Weight — thin label + bold serif title ── */
		.stype-c {
			background:
				radial-gradient(ellipse 60% 65% at 100% 100%, rgba(88, 148, 148, 0.20) 0%, transparent 58%),
				#F4F2EE;
			border: 1px solid rgba(42, 42, 42, 0.07);
		}

		.stype-c .stype-label {
			background: rgba(42, 42, 42, 0.06);
			color: rgba(42, 42, 42, 0.35);
		}

		.sc-eyebrow {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.28em;
			text-transform: uppercase;
			color: var(--celadon);
			margin-bottom: 10px;
		}

		.sc-title {
			font-family: 'Fraunces', serif;
			font-weight: 700;
			font-style: italic;
			font-size: 44px;
			line-height: 1.0;
			letter-spacing: -0.01em;
			color: var(--ink);
		}

		.sc-sub {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 13px;
			letter-spacing: 0.28em;
			text-transform: uppercase;
			color: var(--ink);
			opacity: 0.35;
			margin-top: 14px;
		}

		/* ── Style D: Elegant Serif — Cormorant light italic ── */
		.stype-d {
			background:
				radial-gradient(ellipse 65% 60% at 0% 100%, rgba(120, 100, 160, 0.18) 0%, transparent 58%),
				#2A2A2A;
		}

		.stype-d .stype-label {
			background: rgba(255, 255, 255, 0.08);
			color: rgba(255, 255, 255, 0.35);
		}

		.sd-tagline {
			font-family: 'Cormorant Garamond', serif;
			font-weight: 300;
			font-style: italic;
			font-size: 36px;
			line-height: 1.25;
			letter-spacing: 0.02em;
			color: rgba(255, 255, 255, 0.82);
		}

		.sd-brand {
			display: flex;
			align-items: center;
			gap: 12px;
			margin-top: 18px;
		}

		.sd-line {
			width: 24px;
			height: 1px;
			background: rgba(255, 255, 255, 0.25);
		}

		.sd-brand-name {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 10px;
			letter-spacing: 0.38em;
			text-transform: uppercase;
			color: rgba(255, 255, 255, 0.28);
		}

		/* ── Style E: Event Info — functional mono grid ── */
		.stype-e {
			background:
				radial-gradient(ellipse 60% 55% at 50% 0%, rgba(196, 120, 74, 0.14) 0%, transparent 56%),
				#F4F2EE;
			border: 1px solid rgba(42, 42, 42, 0.07);
			justify-content: space-between;
			padding-top: 32px;
		}

		.stype-e .stype-label {
			background: rgba(42, 42, 42, 0.06);
			color: rgba(42, 42, 42, 0.35);
		}

		.se-top {
			display: flex;
			align-items: baseline;
			gap: 16px;
		}

		.se-brand {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 28px;
			letter-spacing: 0.32em;
			text-transform: uppercase;
			color: var(--ink);
			opacity: 0.75;
		}

		.se-presents {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.18em;
			text-transform: uppercase;
			color: var(--amber);
			opacity: 0.7;
		}

		.se-event {
			font-family: 'Fraunces', serif;
			font-weight: 900;
			font-size: 42px;
			line-height: 0.95;
			color: var(--ink);
			letter-spacing: -0.01em;
		}

		.se-info-row {
			display: flex;
			gap: 28px;
			margin-top: 20px;
		}

		.se-info-block {
			display: flex;
			flex-direction: column;
			gap: 3px;
		}

		.se-info-label {
			font-family: 'Space Mono', monospace;
			font-size: 8px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			color: var(--ink);
			opacity: 0.3;
		}

		.se-info-value {
			font-family: 'Space Mono', monospace;
			font-size: 11px;
			letter-spacing: 0.08em;
			color: var(--ink);
			opacity: 0.7;
		}

		/* ── Caption block below each stype ── */
		.stype-caption {
			margin-top: 10px;
			display: flex;
			justify-content: space-between;
			align-items: baseline;
		}

		.stype-caption-name {
			font-family: 'Noto Sans TC', sans-serif;
			font-size: 11px;
			font-weight: 500;
			color: var(--ink);
		}

		.stype-caption-when {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			opacity: 0.55;
			letter-spacing: 0.08em;
		}

		/* ─────────────────────────────────────────
   LOGO BLEND NOTE BLOCK
───────────────────────────────────────── */
		.logo-blend-note {
			border-radius: 10px;
			padding: 28px 32px;
			background: rgba(42, 42, 42, 0.03);
			border: 1px solid rgba(42, 42, 42, 0.07);
			display: grid;
			grid-template-columns: 1fr 2fr;
			gap: 32px;
			align-items: start;
			margin-bottom: 32px;
		}

		.lbn-label {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.2em;
			text-transform: uppercase;
			opacity: 0.3;
			margin-bottom: 8px;
		}

		.lbn-title {
			font-family: 'Noto Sans TC', sans-serif;
			font-weight: 700;
			font-size: 13px;
			margin-bottom: 6px;
		}

		.lbn-body {
			font-family: 'DM Sans', sans-serif;
			font-size: 12px;
			line-height: 1.75;
			opacity: 0.5;
		}

		.lbn-modes {
			display: flex;
			flex-direction: column;
			gap: 10px;
		}

		.lbn-mode {
			display: flex;
			gap: 12px;
			align-items: flex-start;
		}

		.lbn-mode-tag {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.1em;
			padding: 3px 8px;
			border-radius: 3px;
			white-space: nowrap;
			flex-shrink: 0;
		}

		.lbn-mode-tag.ink {
			background: #2A2A2A;
			color: #F2EFEA;
		}

		.lbn-mode-tag.screen {
			background: #E8E4DC;
			color: #2A2A2A;
		}

		.lbn-mode-desc {
			font-family: 'DM Sans', sans-serif;
			font-size: 12px;
			line-height: 1.7;
			opacity: 0.78;
			padding-top: 2px;
		}

		.footer-bar {
			margin-top: 80px;
			padding-top: 24px;
			border-top: 1px solid rgba(42, 42, 42, 0.08);
			display: flex;
			justify-content: space-between;
			align-items: center;
		}

		.footer-brand {
			font-family: 'Josefin Sans', sans-serif;
			font-weight: 100;
			font-size: 12px;
			letter-spacing: 0.3em;
			text-transform: uppercase;
			opacity: 0.3;
		}

		.footer-date {
			font-family: 'Space Mono', monospace;
			font-size: 9px;
			letter-spacing: 0.15em;
			opacity: 0.25;
		}
	</style>
</head>
